<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>LKW • Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/CSS/dashboard.css">
</head>
<body class="p-3 p-md-4">
  <div class="container-fluid" id="dashboard">

    <!-- Kopfzeile -->
    <div class="d-flex flex-column flex-sm-row align-items-center justify-content-between gap-2 mb-2 dashboard-toolbar dashboard-toolbar-compact">
  <div class="text-center text-sm-start">
    <h1 class="h6 mb-0">Dashboard</h1>
    <div id="dashboardLastUpdate" class="small text-muted">Zuletzt aktualisiert: 05:44 Uhr</div>
  </div>

  <button type="button" class="btn btn-primary btn-sm px-3" id="btnReload" data-bound="1">
    <i class="bi bi-arrow-clockwise me-1"></i>Reload
  </button>
</div>
</div>

    <!-- OBERER BEREICH: Wareneingang / Warenausgang -->
    <div class="row g-3 mb-3">

      <!-- Wareneingang -->
      <div class="col-12">
        <div class="card stat-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
              <div>
                <div class="sub fw-semibold">Wareneingang</div>
                <div class="small text-muted">Tages- &amp; Jahresstatistik</div>
              </div>

              <div class="d-flex align-items-center gap-2 flex-wrap">
                <label for="weLgFilter" class="small text-muted mb-0">Lagergruppe:</label>
                <select id="weLgFilter" class="form-select form-select-sm dashboard-filter-select">
                  <option value="ALL">Alle</option>
                </select>
              </div>
            </div>

            <div id="weTrend" class="mt-3">
              <div class="text-muted small">– lädt –</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Warenausgang -->
      <div class="col-12">
        <div class="card stat-card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center gap-2">
  <div>
    <div class="sub fw-semibold">Warenausgang</div>
    <div class="small text-muted">Tages- &amp; Jahresstatistik</div>
  </div>

  <div class="d-flex flex-column align-items-start">
  <label for="waLgFilter" class="small text-muted mb-1">Lagergruppe:</label>
  <select id="waLgFilter" class="form-select form-select-sm dashboard-filter-select">
    <option value="ALL">Alle</option>
    <option value="G9">G9</option>
    <option value="Müll">Müll</option>
    <option value="UNBEKANNT">UNBEKANNT</option>
    <option value="W1">W1</option>
    <option value="X3">X3</option>
    <option value="X3(B)">X3(B)</option>
  </select>
</div>
</div>

            <div id="waTrend" class="mt-3">
              <div class="text-muted small">– lädt –</div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- MITTLERER BEREICH: Lagerbestand / Transport -->
    <div class="row g-3 mb-4">
      <div class="col-12 col-lg-6">
        <div class="card stat-card h-100">
          <div class="card-body">
            <div class="sub fw-semibold mb-2">Lagerbestand</div>
            <div id="dashboardLagerBestand">
              <div class="text-muted small">– lädt –</div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="card stat-card h-100">
          <div class="card-body">
            <div class="sub fw-semibold mb-2">Transport / LKW</div>
            <div id="dashboardLagerTransport">
              <div class="text-muted small">– lädt –</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- UNTERER BEREICH: Stammdaten / Fahrer -->
    <div class="row g-3 mb-4">

      <!-- Stammdaten -->
      <div class="col-12 col-lg-8">
  <div class="card stat-card h-100">
    <div class="card-body">
      <div class="sub fw-semibold mb-2">Stammdaten</div>

      <!-- Nur Smartphone -->
      <div id="sdMobileSummary" class="d-block d-sm-none">
        <div class="text-muted small">– lädt –</div>
      </div>

      <!-- Ab Small / Desktop -->
      <div class="table-responsive dashboard-stammdaten-wrap d-none d-sm-block" id="sdTrendWrap">
        <table class="table table-sm table-borderless mb-1 align-middle text-nowrap" id="sdTrend">
          <thead class="text-muted small">
            <tr>
              <th>Typ</th>
              <th class="text-end">Heute</th>
              <th class="text-end d-none d-sm-table-cell">Gestern</th>
              <th class="text-end d-none d-md-table-cell">Vorwoche</th>
              <th class="text-end d-none d-lg-table-cell">Vorjahr</th>
            </tr>
          </thead>
          <tbody id="sdTrendBody">
            <tr>
              <td colspan="5" class="text-muted">– lädt –</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

      <!-- Fahrerübersicht -->
      <div class="col-12 col-lg-4">
        <div class="card stat-card h-100">
          <div class="card-body position-relative overflow-hidden">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <div>
                <div class="sub fw-semibold">Fahrerübersicht</div>
                <div class="small text-muted">Aktive Touren &amp; Positionen</div>
              </div>
            </div>

            <div id="driverSummary" class="small">
              <div class="text-muted">– lädt –</div>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script type="module">
    import { initDashboard } from '/js/dashboard.js';

    window.addEventListener('DOMContentLoaded', () => {
      initDashboard(document);
    });
  </script>
</body>
</html>
